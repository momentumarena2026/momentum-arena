name: Seed Staging DB

on:
  push:
    branches:
      - development

jobs:
  seed:
    name: Seed Staging Database
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.STAGING_DB_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify DATABASE_URL is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is empty! Add STAGING_DB_URL to repository secrets."
            exit 1
          fi
          echo "DATABASE_URL is set (${#DATABASE_URL} chars)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Pre-push data cleanup (idempotent)
        run: npx prisma db execute --file ./prisma/scripts/pre-db-push-cleanup.sql --schema ./prisma/schema.prisma

      - name: Push schema to staging DB
        run: npx prisma db push --accept-data-loss --skip-generate

      - name: Seed staging database
        run: npx tsx prisma/seed.ts
